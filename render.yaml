services:
  - type: web
    name: bubblyr
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /healthz
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bubblyr-db
          property: connectionString

databases:
  - name: bubblyr-db
    plan: basic-256mb
